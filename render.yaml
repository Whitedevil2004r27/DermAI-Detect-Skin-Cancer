services:
  # 🩺 Backend API (FastAPI)
  - type: web
    name: dermai-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    plan: pro # Recommended for AI models (2GB RAM)
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0

  # 🖥️ Frontend Client (Next.js)
  - type: web
    name: dermai-web
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: dermai-api
          type: web
          property: host
