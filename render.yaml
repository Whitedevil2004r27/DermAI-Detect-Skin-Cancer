services:
  # 🖥️ Frontend Client (Next.js) - Render Free Tier
  - type: web
    name: dermai-web
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        # PASTE YOUR HUGGING FACE SPACE URL HERE (e.g. https://user-name-dermai.hf.space)
        value: "https://huggingface.co/spaces/" 
